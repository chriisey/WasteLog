name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyqt6 pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name WasteLog main.py

      - name: Pubblica Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: WasteLog — ultima versione
          body: Scarica WasteLog.exe e avvialo direttamente, nessuna installazione richiesta.
          files: dist/WasteLog.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
