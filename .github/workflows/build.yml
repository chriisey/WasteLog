name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyqt6 pyinstaller

      - name: Get version
        id: get_version
        run: |
          $v = python -c "import re; m = re.search(r\"VERSION\s*=\s*'(.+?)'\", open('main.py').read()) or re.search(r'VERSION\s*=\s*\"(.+?)\"', open('main.py').read()); print(m.group(1))"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name WasteLog main.py

      - name: Pubblica Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: WasteLog v${{ steps.get_version.outputs.version }}
          body: Scarica WasteLog.exe e avvialo direttamente, nessuna installazione richiesta.
          files: dist/WasteLog.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
