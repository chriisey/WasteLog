name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyqt6 pyinstaller

      - name: Get version
        id: get_version
        shell: python
        run: |
          import re, os
          content = open('main.py', encoding='utf-8').read()
          m = re.search(r'VERSION\s*=\s*["\']([^"\']+)', content)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"version={m.group(1)}\n")

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name WasteLog main.py

      - name: Pubblica Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: WasteLog v${{ steps.get_version.outputs.version }}
          body: Scarica WasteLog.exe e avvialo direttamente, nessuna installazione richiesta.
          files: dist/WasteLog.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
